<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>


<body class="body">

  <header class="header">
    <img src="./eisenhower-matrix.jpg" alt="eisenhower matrix" class="header__img">

    <h1 class="h1">
      <a class="link" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </h1>

  </header>

  <main class="main">

    <section class="block-add">

      <h3 class="h3 h3_block-add">Add Item</h3>

      <article class="block-add__task-row-wrapper">
        <input id="new-task" class="task-item__input" type="text">
        <button class="button">Add</button>
      </article>

    </section>

    <section class="block-todo">

      <h3 class="h3">Todo</h3>

      <ul class="block-todo__incomplete-tasks">
        <li class="task-item">
          <input type="checkbox" class="task-item__checkbox">
          <label class="task-item__label">Pay Bills</label>
          <input type="text" class="task-item__input">
          <button class="task-item__bt-edit button">Edit</button>
          <button class="task-item__bt-delete button">
            <img src="./remove.svg" alt="remove" class="bt-delete__img">
          </button>
        </li>

        <li class=" task-item task-item_edit-mode">
          <input type="checkbox" class="task-item__checkbox">
          <label class="task-item__label">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task-item__input">
          <button class="task-item__bt-edit button">Save</button>
          <button class="task-item__bt-delete button">
            <img src="./remove.svg" alt="remove" class="bt-delete__img">
          </button>
        </li>
      </ul>

    </section>


    <section class="block-complete">

      <h3 class="h3">Completed</h3>

      <ul class="block-complete__completed-tasks">
        <li class="task-item">
          <input type="checkbox" checked class="task-item__checkbox">
          <label class="task-item__label">See the Doctor</label>
          <input type="text" class="task-item__input">
          <button class="task-item__bt-edit button">Edit</button>
          <button class="task-item__bt-delete button">
            <img src="./remove.svg" alt="remove" class="bt-delete__img">
          </button>
        </li>
      </ul>

    </section>

  </main>

  <script src="app.js"></script>
</body>

</html>
