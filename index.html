<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <header class="header">
    <img src="./eisenhower-matrix.jpg" alt="eisenhower matrix" class="header__img">
    <h1 class="h1">
      <a class="link" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </h1>
  </header>

  <main class="main">
    <section class="block-add">
      <h3 class="h3 h3_block-add">Add Item</h3>
      <article class="block-add__task-row-wrapper">
        <input id="new-task" class="task-input" type="text">
        <button class="button">Add</button>
      </article>
    </section>

    <section class="block-todo">
      <h3 class="h3">Todo</h3>
      <ul class="block-todo__incomplete-tasks">
        <li>
          <input type="checkbox">
          <label class="task">Pay Bills</label>
          <input type="text" class="task task-input">
          <button class="bt-edit-task button">Edit</button>
          <button class="bt-edit-delete button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>

        <li class="edit-mode-task">
          <input type="checkbox">
          <label class="task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task task-input">
          <button class="bt-edit-task button">Save</button>
          <button class="bt-edit-delete button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>
      </ul>
    </section>

    <section class="block-complete">
      <h3 class="h3">Completed</h3>
      <ul class="block-complete__completed-tasks">
        <li>
          <input type="checkbox" checked>
          <label class="task">See the Doctor</label>
          <input type="text" class="task task-input">
          <button class="bt-edit-task button">Edit</button>
          <button class="bt-edit-delete button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
